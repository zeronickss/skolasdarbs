<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roll</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            font-family: sans-serif;
        }
        img {
            width: 150px;
            height: 150px;
            margin-top: 20px;
            border: 2px solid #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    
    <h2>Tavs metiens:</h2>
    <img id="diceImage" src="" alt="Metamais kauliņš">

    <script>
        const randomSkaitlis = Math.floor(Math.random() * 6) + 1;
        console.log("Izvēlētais skaitlis: " + randomSkaitlis);
        const imageElement = document.getElementById("diceImage");
        if(randomSkaitlis === 1) {
            imageElement.src = "https://via.placeholder.com/150/FF0000/FFFFFF?text=Dice+1";
            console.log("Izkrita 1");
        } else if (randomSkaitlis === 2) {
            imageElement.src = "https://via.placeholder.com/150/00FF00/FFFFFF?text=Dice+2";
            console.log("Izkrita 2");
        } else if (randomSkaitlis === 3) {
            imageElement.src = "https://via.placeholder.com/150/0000FF/FFFFFF?text=Dice+3";
            console.log("Izkrita 3");
        } else if (randomSkaitlis === 4) {
            imageElement.src = "https://via.placeholder.com/150/FFFF00/000000?text=Dice+4";
            console.log("Izkrita 4");
        } else if (randomSkaitlis === 5) {
            imageElement.src = "https://via.placeholder.com/150/FF00FF/FFFFFF?text=Dice+5";
            console.log("Izkrita 5");
        } else {
            imageElement.src = "https://via.placeholder.com/150/00FFFF/000000?text=Dice+6";
            console.log("Izkrita 6");
        }
    </script>
</body>
</html>

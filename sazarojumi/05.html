<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Boxes</title>
    <style>
        .box {
            height: 150px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="test"></div>

    <script>
        function randomBox(parentNode, colorArray) {
            const newDiv = document.createElement("div");
            const randomColor = colorArray[Math.floor(Math.random() * colorArray.length)];
            newDiv.classList.add("box");
            
            let randomNum = Math.random();
            let maxWidth = parentNode.offsetWidth || window.innerWidth;
            let randomWidth = maxWidth * randomNum;
            newDiv.style.width = `${randomWidth}px`;
            newDiv.style.backgroundColor = randomColor;
            newDiv.style.opacity = randomNum;
            
            parentNode.appendChild(newDiv);
        }

        const parentElement = document.body;
        const test = document.getElementById("test");
        
        randomBox(parentElement, ["red", "green", "blue"]);
        randomBox(parentElement, ["black", "yellow", "orange"]);
        randomBox(test, ["purple", "cyan", "magenta"]);
        
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Battle</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            font-family: sans-serif;
            background-color: #f0f0f0;
        }
        .game-container {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        img {
            width: 120px;
            height: 120px;
            display: block;
            margin: 10px auto;
        }
        button {
            padding: 10px 25px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #45a049; }
        #resultText {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="player-box">
            <h3>You</h3>
            <img id="userDice" src="Side_1_Pip.png">
        </div>
        <div class="player-box">
            <h3>AI</h3>
            <img id="aiDice" src="Side_1_Pip.png">
        </div>
    </div>

    <button onclick="playGame()">Roll Dice!</button>
    <div id="resultText"></div>

    <script>
        function rollDice() {
            return Math.floor(Math.random() * 6) + 1;
        }

        function updateDisplay(id, roll) {
            const imgElement = document.getElementById(id);
            if (roll === 1) imgElement.src = "Side_1_Pip.png";
            else if (roll === 2) imgElement.src = "Side_2_Pips.png";
            else if (roll === 3) imgElement.src = "Side_3_Pips.png";
            else if (roll === 4) imgElement.src = "Side_4_Pips.png";
            else if (roll === 5) imgElement.src = "Side_5_Pips.png";
            else imgElement.src = "Side_6_Pips.png";
        }

        function playGame() {
            const userRoll = rollDice();
            const aiRoll = rollDice();

            updateDisplay("userDice", userRoll);
            updateDisplay("aiDice", aiRoll);

            const resultElement = document.getElementById("resultText");
            
            if (userRoll > aiRoll) {
                resultElement.innerText = `You won! (${userRoll} vs ${aiRoll})`;
            } else if (aiRoll > userRoll) {
                resultElement.innerText = `AI won! (${aiRoll} vs ${userRoll})`;
            } else {
                resultElement.innerText = `It's a draw! (${userRoll} vs ${aiRoll})`;
            }
        }
    </script>
</body>
</html>

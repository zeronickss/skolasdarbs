<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const loma = 'student';
        const irAudzinatajs = false;

function iegutAtļaujas(loma, irAudzinatajs) {

  const atļaujas = {
    varSkatities: false,
    varRediget: false
  };

  if (loma === 'admin') {
    atļaujas.varSkatities = true;
    atļaujas.varRediget = true;
  } 
  else if (loma === 'teacher') {
    atļaujas.varSkatities = true;

    if (irAudzinatajs) {
      atļaujas.varRediget = true;
    }
  } 
  else if (loma === 'student') {

    atļaujas.varSkatities = true;
    atļaujas.varRediget = false;
  }

  return atļaujas;
}   
console.log(iegutAtļaujas(loma, irAudzinatajs));


    </script>
</body>
</html>
